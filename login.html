<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ISSU Enablement Hub - 로그인</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css">
  <!-- CSS Stylesheet -->
  <link rel="stylesheet" href="style.css">
  <!-- Lucide Icons -->
  <script src="https://unpkg.com/lucide@latest"></script>
  <style>
    .login-container {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 2rem;
    }
    .login-card {
      width: 100%;
      max-width: 440px;
      padding: 2.5rem;
      border: 1px solid var(--card-border);
      position: relative;
      overflow: hidden;
    }
    .login-logo {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.75rem;
      margin-bottom: 2rem;
      text-align: center;
    }
    .login-logo .logo-icon {
      background: var(--gradient-main);
      width: 50px;
      height: 50px;
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #11171e;
      box-shadow: var(--shadow-glow);
    }
    .login-logo h2 {
      font-family: var(--font-header);
      font-size: 1.8rem;
      font-weight: 800;
      letter-spacing: 0;
      color: var(--text-primary);
      margin-top: 0.5rem;
    }
    .login-logo p {
      font-size: 0.95rem;
      color: var(--text-secondary);
    }
    .form-group {
      margin-bottom: 1.25rem;
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
    }
    .form-group label {
      font-size: 0.95rem;
      color: var(--text-secondary);
      font-weight: 600;
    }
    .input-wrapper {
      position: relative;
    }
    .input-wrapper svg {
      position: absolute;
      left: 1rem;
      top: 50%;
      transform: translateY(-50%);
      width: 16px;
      height: 16px;
      color: var(--text-secondary);
    }
    .form-control {
      width: 100%;
      background: var(--surface-muted);
      border: 1px solid var(--card-border);
      border-radius: 8px;
      min-height: 52px;
      padding: 0.85rem 1rem 0.85rem 2.75rem;
      color: var(--text-primary);
      font-family: var(--font-main);
      font-size: 1rem;
      line-height: 1.5;
      outline: none;
      transition: var(--transition-smooth);
    }
    .form-control:focus {
      border-color: var(--accent-blue);
      box-shadow: 0 0 10px rgba(76, 154, 255, 0.15);
    }
    .login-btn {
      width: 100%;
      background: var(--gradient-main);
      color: #11171e;
      border: none;
      min-height: 50px;
      padding: 0.9rem;
      border-radius: 8px;
      font-weight: 600;
      font-size: 1rem;
      cursor: pointer;
      box-shadow: var(--shadow-glow);
      transition: var(--transition-smooth);
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.5rem;
      margin-top: 1.5rem;
    }
    .login-btn:hover {
      transform: translateY(-1px);
      filter: brightness(1.1);
    }
    .error-box {
      background: rgba(239, 68, 68, 0.08);
      border: 1px solid rgba(239, 68, 68, 0.2);
      color: #fca5a5;
      padding: 0.75rem 1rem;
      border-radius: 6px;
      font-size: 0.85rem;
      margin-bottom: 1.25rem;
      display: none;
      align-items: center;
      gap: 0.5rem;
    }

  </style>
</head>
<body>
  <div class="glow-container">
    <div class="glow-orb orb-1"></div>
    <div class="glow-orb orb-2"></div>
  </div>

  <div class="login-container">
    <div class="glass-card login-card">
      <div class="login-logo">
        <div class="logo-icon">
          <i data-lucide="shield-check"></i>
        </div>
        <h2>ISSU Enablement Hub</h2>
        <p>딜 허브 · AI Radar · 관리자 콘솔 통합 로그인</p>
      </div>

      <div class="error-box" id="error-message">
        <i data-lucide="alert-circle"></i>
        <span id="error-text">에러 메시지</span>
      </div>

      <form id="login-form">
        <div class="form-group">
          <label for="email">사내 이메일 계정</label>
          <div class="input-wrapper">
            <i data-lucide="mail"></i>
            <input type="email" id="email" class="form-control" placeholder="username@mzc.co.kr" required>
          </div>
        </div>

        <div class="form-group">
          <label for="password">비밀번호</label>
          <div class="input-wrapper">
            <i data-lucide="lock"></i>
            <input type="password" id="password" class="form-control" placeholder="••••••••" required>
          </div>
        </div>

        <button type="submit" class="login-btn">
          <span>안전한 로그인</span>
          <i data-lucide="arrow-right"></i>
        </button>
      </form>


    </div>
  </div>

  <script>
    lucide.createIcons();

    document.getElementById('login-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      
      const email = document.getElementById('email').value;
      const password = document.getElementById('password').value;
      const errorBox = document.getElementById('error-message');
      const errorText = document.getElementById('error-text');

      errorBox.style.display = 'none';

      try {
        const response = await fetch('/api/auth/login', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json'
          },
          body: JSON.stringify({ email, password })
        });

        const data = await response.json();

        if (!response.ok) {
          throw new Error(data.error || '로그인에 실패했습니다.');
        }

        const requestedPath = new URLSearchParams(window.location.search).get('next');
        const allowedPaths = new Set(['/hub', '/radar', '/about', '/admin', '/admin/usage']);
        let safePath = '/hub';
        try {
          const destination = new URL(requestedPath || '/hub', window.location.origin);
          if (destination.origin === window.location.origin && allowedPaths.has(destination.pathname)) {
            safePath = `${destination.pathname}${destination.search}${destination.hash}`;
          }
        } catch (_error) {
          // Keep the safe default when the requested URL cannot be parsed.
        }
        window.location.assign(safePath);
      } catch (err) {
        errorText.textContent = err.message;
        errorBox.style.display = 'flex';
      }
    });
  </script>
</body>
</html>
