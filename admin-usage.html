<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ISSU AI Radar - 사용 로그 대시보드</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css">
  <!-- CSS Stylesheet -->
  <link rel="stylesheet" href="../style.css">
  <link rel="stylesheet" href="style.css">
  <!-- Lucide Icons -->
  <script src="https://unpkg.com/lucide@latest"></script>
  <style>
    .usage-layout {
      max-width: 1400px;
      margin: 0 auto;
      padding: 0 2rem 3rem;
      display: flex;
      flex-direction: column;
      gap: 2rem;
    }
    
    /* Stats Grid */
    .stats-summary-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 1.5rem;
    }
    .stat-box {
      display: flex;
      align-items: center;
      gap: 1.25rem;
      border: 1px solid var(--card-border);
    }
    .stat-icon {
      width: 48px;
      height: 48px;
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
    }
    .stat-icon.purple { background: rgba(168, 85, 247, 0.15); color: var(--accent-purple); }
    .stat-icon.blue { background: rgba(14, 165, 233, 0.15); color: var(--accent-blue); }
    .stat-icon.green { background: rgba(34, 197, 94, 0.15); color: var(--accent-green); }
    .stat-icon.orange { background: rgba(249, 115, 22, 0.15); color: var(--accent-orange); }
    
    .stat-data {
      display: flex;
      flex-direction: column;
      gap: 2px;
    }
    .stat-data span {
      font-size: 0.8rem;
      color: var(--text-secondary);
    }
    .stat-data strong {
      font-size: 1.6rem;
      font-weight: 700;
      font-family: var(--font-header);
      color: var(--text-primary);
    }

    /* Charts Grid */
    .charts-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 2rem;
    }
    @media (max-width: 900px) {
      .charts-grid {
        grid-template-columns: 1fr;
      }
    }
    
    /* Custom Bar Chart styling */
    .bar-chart-container {
      display: flex;
      flex-direction: column;
      gap: 1rem;
      margin-top: 1rem;
    }
    .bar-row {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }
    .bar-label-row {
      display: flex;
      justify-content: space-between;
      font-size: 0.85rem;
    }
    .bar-label-row span { color: var(--text-secondary); }
    .bar-label-row strong { color: var(--text-primary); }
    
    .bar-bg {
      background: rgba(0, 0, 0, 0.04);
      height: 8px;
      border-radius: 4px;
      width: 100%;
      overflow: hidden;
    }
    .bar-fill {
      height: 100%;
      border-radius: 4px;
      width: 0%;
      transition: width 1s ease-in-out;
    }
    .bar-fill.purple { background: var(--gradient-main); }
    .bar-fill.blue { background: var(--accent-blue); }

    /* Audit Log Table styling */
    .log-table-card {
      padding: 0;
      overflow: hidden;
    }
    .log-table-header {
      padding: 1.5rem;
      border-bottom: 1px solid var(--card-border);
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .log-table-header h3 {
      font-size: 1.1rem;
      font-weight: 600;
      color: var(--text-primary);
    }
  </style>
</head>
<body>
  <div class="glow-container">
    <div class="glow-orb orb-1"></div>
    <div class="glow-orb orb-2"></div>
  </div>

  <header class="app-header">
    <div class="header-content" style="display: flex; justify-content: space-between; align-items: flex-start; gap: 2rem; flex-wrap: wrap;">
      <div class="header-left">
        <div class="logo-area">
          <div class="logo-icon">
            <i data-lucide="line-chart"></i>
          </div>
          <div class="logo-text">
            <h1>ISSU AI Radar - Usage Dashboard</h1>
            <span>실시간 서비스 이용 및 감사(Audit) 로그 관제소</span>
          </div>
        </div>
      </div>
      <div class="header-right" style="display: flex; gap: 10px;">
        <a href="/" class="back-btn" style="margin-top:0; text-decoration:none;">
          <i data-lucide="layout-dashboard"></i>대시보드 홈
        </a>
        <a href="/admin" class="back-btn" style="margin-top:0; text-decoration:none; border-color: var(--accent-purple); color: var(--accent-purple);">
          <i data-lucide="settings"></i>어드민 콘솔
        </a>
      </div>
    </div>
  </header>

  <div class="usage-layout">
    <!-- Row 1: KPI Stats Summary -->
    <div class="stats-summary-grid">
      <!-- Stat 1: Total Hits -->
      <div class="glass-card stat-box">
        <div class="stat-icon purple">
          <i data-lucide="database"></i>
        </div>
        <div class="stat-data">
          <span>누적 총 감사 로그 수</span>
          <strong id="stat-total-logs">0</strong>
        </div>
      </div>
      <!-- Stat 2: Daily Unique Users -->
      <div class="glass-card stat-box">
        <div class="stat-icon blue">
          <i data-lucide="users"></i>
        </div>
        <div class="stat-data">
          <span>전일/금일 활성 로그인 계정</span>
          <strong id="stat-daily-users">0</strong>
        </div>
      </div>
      <!-- Stat 3: Total Views -->
      <div class="glass-card stat-box">
        <div class="stat-icon green">
          <i data-lucide="eye"></i>
        </div>
        <div class="stat-data">
          <span>누적 솔루션 상세 조회수</span>
          <strong id="stat-total-views">0</strong>
        </div>
      </div>
      <!-- Stat 4: Search Logs -->
      <div class="glass-card stat-box">
        <div class="stat-icon orange">
          <i data-lucide="search"></i>
        </div>
        <div class="stat-data">
          <span>누적 지식 검색 횟수</span>
          <strong id="stat-total-searches">0</strong>
        </div>
      </div>
    </div>

    <!-- Row 2: Charts (Popular searches and solutions) -->
    <div class="charts-grid">
      <!-- Chart Left: Popular Solution Views -->
      <div class="glass-card">
        <h3 style="font-size: 1.05rem; font-weight: 700; color: var(--text-primary); border-bottom: 1px solid rgba(255,255,255,0.05); padding-bottom: 0.5rem; display: flex; align-items: center; gap: 6px;">
          <i data-lucide="trending-up" style="color: var(--accent-blue); width: 18px; height: 18px;"></i>
          가장 많이 조회된 솔루션 가이드 TOP 5
        </h3>
        <div class="bar-chart-container" id="solution-chart">
          <!-- Populated dynamically -->
        </div>
      </div>
      
      <!-- Chart Right: Popular Search Keywords -->
      <div class="glass-card">
        <h3 style="font-size: 1.05rem; font-weight: 700; color: var(--text-primary); border-bottom: 1px solid rgba(255,255,255,0.05); padding-bottom: 0.5rem; display: flex; align-items: center; gap: 6px;">
          <i data-lucide="tag" style="color: var(--accent-purple); width: 18px; height: 18px;"></i>
          자주 검색된 영업 키워드 TOP 5
        </h3>
        <div class="bar-chart-container" id="keyword-chart">
          <!-- Populated dynamically -->
        </div>
      </div>
    </div>

    <!-- Row 3: Live Audit Log Table -->
    <div class="glass-card log-table-card">
      <div class="log-table-header">
        <h3>최근 발생한 사내 사용자 활동 로그 (실시간)</h3>
        <span class="layer-badge" style="background: rgba(14, 165, 233, 0.1); color: var(--accent-blue); font-weight:600;">최대 100개 감사 기록</span>
      </div>
      <div class="table-container" style="max-height: 500px; overflow-y: auto;">
        <table class="isv-table" style="table-layout: fixed;">
          <thead style="position: sticky; top:0; z-index: 10; background: #f8fafc; border-bottom: 2px solid var(--card-border);">
            <tr>
              <th style="width: 15%;">발생 시각</th>
              <th style="width: 20%;">사용자 이메일 / 이름</th>
              <th style="width: 12%;">역할 (Role)</th>
              <th style="width: 13%;">액션 (Action)</th>
              <th style="width: 20%;">대상 솔루션</th>
              <th style="width: 20%;">비고 / 쿼리</th>
            </tr>
          </thead>
          <tbody id="audit-log-tbody">
            <!-- Populated dynamically -->
          </tbody>
        </table>
      </div>
    </div>
  </div>

  <script>
    window.addEventListener('DOMContentLoaded', async () => {
      // Auth verification
      try {
        const meRes = await fetch('/api/auth/me');
        if (!meRes.ok) {
          window.location.href = '/login.html?next=/admin/usage';
          return;
        }
        const meData = await meRes.json();
        if (meData.user.role !== 'admin') {
          alert('관리자 권한이 없습니다.');
          await fetch('/api/auth/logout', { method: 'POST' }).catch(() => {});
          window.location.href = '/login.html?next=/admin/usage';
          return;
        }
      } catch (e) {
        window.location.href = '/login.html?next=/admin/usage';
        return;
      }

      lucide.createIcons();
      await loadUsageStats();
    });

    async function loadUsageStats() {
      try {
        const res = await fetch('/api/admin/usage');
        if (!res.ok) throw new Error('이용 통계 데이터를 가져오지 못했습니다.');
        const data = await res.json();

        // 1. KPI Stats Populate
        document.getElementById('stat-total-logs').textContent = data.totalLogs;
        document.getElementById('stat-daily-users').textContent = data.dailyActiveUsers;
        document.getElementById('stat-total-views').textContent = data.actionCounts['view'] || 0;
        document.getElementById('stat-total-searches').textContent = data.actionCounts['search'] || 0;

        // 2. Popular Solutions Chart (TOP 5)
        const solChart = document.getElementById('solution-chart');
        solChart.replaceChildren();
        const topSolutions = data.solutionRanking.slice(0, 5);
        if (topSolutions.length === 0) {
          appendEmptyMessage(solChart, '조회 이력이 없습니다.');
        } else {
          const maxVal = Math.max(1, Number(topSolutions[0].cnt) || 0);
          topSolutions.forEach(s => {
            const count = Number(s.cnt) || 0;
            const pct = Math.min(100, Math.max(10, Math.round((count / maxVal) * 100)));
            solChart.appendChild(createBarRow(s.target, `${count}회 조회`, pct, 'blue'));
          });
        }

        // 3. Popular Search Keywords Chart (TOP 5)
        const kwChart = document.getElementById('keyword-chart');
        kwChart.replaceChildren();
        const topKeywords = data.keywordRanking.slice(0, 5);
        if (topKeywords.length === 0) {
          appendEmptyMessage(kwChart, '검색 이력이 없습니다.');
        } else {
          const maxVal = Math.max(1, Number(topKeywords[0].cnt) || 0);
          topKeywords.forEach(k => {
            const count = Number(k.cnt) || 0;
            const pct = Math.min(100, Math.max(10, Math.round((count / maxVal) * 100)));
            kwChart.appendChild(createBarRow(`"${k.query || ''}"`, `${count}회 검색`, pct, 'purple'));
          });
        }

        // 4. Audit Log Table Populate
        const tbody = document.getElementById('audit-log-tbody');
        tbody.replaceChildren();

        if (data.recentLogs.length === 0) {
          const row = document.createElement('tr');
          const cell = document.createElement('td');
          cell.colSpan = 6;
          cell.style.cssText = 'text-align:center; padding:2rem; color:var(--text-secondary);';
          cell.textContent = '감사 로그가 비어 있습니다.';
          row.appendChild(cell);
          tbody.appendChild(row);
        } else {
          data.recentLogs.forEach(log => {
            const tr = document.createElement('tr');
            const timestamp = new Date(log.created_at);
            const time = Number.isNaN(timestamp.getTime()) ? '-' : timestamp.toLocaleString();
            const emailText = log.user_name ? `${log.user_name} (${log.user_team || 'N/A'})` : '탈퇴한 사용자';

            tr.appendChild(createTextCell(time, 'font-size:0.8rem; color:var(--text-secondary); text-overflow:ellipsis; overflow:hidden; white-space:nowrap;'));

            const userCell = createTextCell('', 'color:var(--text-primary); text-overflow:ellipsis; overflow:hidden; white-space:nowrap;');
            const userName = document.createElement('strong');
            userName.textContent = emailText;
            userCell.appendChild(userName);
            tr.appendChild(userCell);

            const roleCell = document.createElement('td');
            const roleBadge = document.createElement('span');
            roleBadge.className = 'layer-badge';
            roleBadge.style.background = log.user_role === 'admin' ? 'rgba(168,85,247,0.1)' : 'rgba(255,255,255,0.05)';
            roleBadge.style.color = log.user_role === 'admin' ? 'var(--accent-purple)' : 'var(--text-secondary)';
            roleBadge.textContent = log.user_role ? String(log.user_role).toUpperCase() : 'N/A';
            roleCell.appendChild(roleBadge);
            tr.appendChild(roleCell);

            const actionCell = document.createElement('td');
            actionCell.appendChild(createActionBadge(log.action));
            tr.appendChild(actionCell);
            tr.appendChild(createTextCell(log.target || '-', 'color:var(--accent-blue); font-weight:600; text-overflow:ellipsis; overflow:hidden; white-space:nowrap;'));
            tr.appendChild(createTextCell(log.query || '-', 'color:var(--text-secondary); text-overflow:ellipsis; overflow:hidden; white-space:nowrap;'));
            tbody.appendChild(tr);
          });
        }

      } catch (err) {
        alert(err.message);
      }
    }

    function appendEmptyMessage(container, message) {
      const paragraph = document.createElement('p');
      paragraph.style.cssText = 'color:var(--text-secondary); font-size:0.85rem; text-align:center;';
      paragraph.textContent = message;
      container.appendChild(paragraph);
    }

    function createBarRow(label, countLabel, percent, colorClass) {
      const row = document.createElement('div');
      row.className = 'bar-row';
      const labelRow = document.createElement('div');
      labelRow.className = 'bar-label-row';
      const strong = document.createElement('strong');
      strong.textContent = String(label ?? '');
      const count = document.createElement('span');
      count.textContent = countLabel;
      labelRow.append(strong, count);

      const background = document.createElement('div');
      background.className = 'bar-bg';
      const fill = document.createElement('div');
      fill.className = `bar-fill ${colorClass}`;
      fill.style.width = `${percent}%`;
      background.appendChild(fill);
      row.append(labelRow, background);
      return row;
    }

    function createTextCell(value, styles = '') {
      const cell = document.createElement('td');
      cell.style.cssText = styles;
      cell.textContent = String(value ?? '');
      return cell;
    }

    function createActionBadge(action) {
      const styles = {
        publish: ['rgba(168, 85, 247, 0.15)', 'var(--accent-purple)'],
        edit: ['rgba(249, 115, 22, 0.15)', 'var(--accent-orange)'],
        view: ['rgba(34, 197, 94, 0.15)', 'var(--accent-green)'],
        search: ['rgba(14, 165, 233, 0.15)', 'var(--accent-blue)'],
        login: ['rgba(255,255,255,0.1)', 'var(--text-primary)']
      };
      const normalized = String(action || '').toLowerCase();
      const badge = document.createElement('span');
      badge.className = 'layer-badge';
      badge.textContent = normalized ? normalized.toUpperCase() : 'N/A';
      if (styles[normalized]) {
        badge.style.background = styles[normalized][0];
        badge.style.color = styles[normalized][1];
      }
      return badge;
    }
  </script>
</body>
</html>
